name: Deploy v2 to production (scheduled)

# Ce workflow merge automatiquement la branche v2 dans main à l'heure programmée.
# Cron UTC : 22:30 le 16 avril 2026 → 00:30 heure française (CEST)
# GitHub Actions cron n'a pas de syntaxe "année" — le workflow tire une fois sur le jour
# spécifié puis redeviendra inactif (idempotent : si v2 == main, rien ne se passe).
#
# Permet aussi un déclenchement manuel (workflow_dispatch) depuis l'onglet Actions.

on:
  schedule:
    - cron: '30 22 16 4 *'  # 16 avril 22:30 UTC = 17 avril 00:30 Paris
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch v2 branch
        run: git fetch origin v2

      - name: Merge v2 into main
        run: |
          # Si v2 == main déjà, on skip (idempotent).
          if git merge-base --is-ancestor origin/v2 HEAD; then
            echo "v2 déjà mergée dans main, rien à faire."
            exit 0
          fi
          git merge --no-ff origin/v2 -m "chore: deploy v2 to production (scheduled)"
          git push origin main
